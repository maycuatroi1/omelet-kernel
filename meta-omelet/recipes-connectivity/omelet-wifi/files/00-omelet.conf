# Omelet NetworkManager tuning (drop-in; does not touch the daemon's own
# /etc/NetworkManager/NetworkManager.conf, so there's no package file clash).

[connection]
# Field device wants a stable link, not battery savings: 2 = disable powersave.
wifi.powersave=2

[device]
# Don't randomise the MAC while scanning — predictable for MAC allow-lists /
# captive portals. Drop this line if you'd rather randomise for stealth.
wifi.scan-rand-mac-address=no
