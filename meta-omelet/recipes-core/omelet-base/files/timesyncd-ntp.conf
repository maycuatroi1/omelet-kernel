# systemd-timesyncd drop-in for the RTC-less Raspberry Pi 4.
#
# The Pi4 has no battery-backed RTC, so after every power loss it boots with a
# stale clock (it starts no later than the systemd build epoch / the last time
# timesyncd saved). Until the clock is corrected it can sit BEFORE the
# "valid from" (notBefore) date of the TLS certificates that opencode's HTTPS
# calls (Anthropic / OpenAI ...) present, so the handshake fails with
# "certificate is not yet valid". This is a wrong-clock problem, not a missing
# CA / broken-SSL problem (ca-certificates is installed).
#
# This image uses NetworkManager, NOT systemd-networkd, so timesyncd is never
# handed the DHCP-advertised NTP servers automatically -- with an empty server
# list it would never sync. List explicit servers here so it syncs as soon as
# WiFi associates. timesyncd also persists the last good time to
# /var/lib/systemd/timesync/clock and bumps the clock forward to it on the next
# boot, so the clock never jumps back to 1970 even while offline.
#
# Drop-in (timesyncd.conf.d/) on purpose: overwriting the package's own
# /etc/systemd/timesyncd.conf from a second package makes opkg refuse the
# overwrite and breaks do_rootfs (same trap as /etc/motd, see omelet-base.bb).
[Time]
NTP=pool.ntp.org time.cloudflare.com
FallbackNTP=time.google.com time.windows.com 0.pool.ntp.org 1.pool.ntp.org
