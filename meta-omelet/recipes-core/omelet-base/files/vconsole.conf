# Virtual console setup, applied at boot by systemd-vconsole-setup.service.
#
# The default kernel built-in console font is an 8-bit CP437 face with only a
# partial Unicode map, so the opencode TUI's box-drawing / block / bullet
# glyphs render as mojibake. Load a full-coverage Unicode console font and let
# systemd put the VTs into UTF-8 mode. Lat2-Terminus16 ships in
# kbd-consolefonts and has the block elements (U+2580-259F) and bullet the
# TUI logo needs.
FONT=Lat2-Terminus16
