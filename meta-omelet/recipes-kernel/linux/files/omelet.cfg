# ======================================================================
# Omelet kernel config fragment (Raspberry Pi 4, 64-bit)
# Merged on top of the bcm2711 defconfig.
# ======================================================================

# ---- Branding: uname -r shows e.g. 6.6.x-omelet ----
CONFIG_LOCALVERSION="-omelet"
# CONFIG_LOCALVERSION_AUTO is not set

# ---- Boot logo: custom Omelet framebuffer logo (clut224) ----
CONFIG_LOGO=y
CONFIG_LOGO_LINUX_CLUT224=y
CONFIG_FB=y
CONFIG_FRAMEBUFFER_CONSOLE=y
CONFIG_DRM_FBDEV_EMULATION=y

# ======================================================================
# Capabilities carried over from the Pi 4 implant design (authorized use)
# ======================================================================

# ---- USB Gadget (USB-C OTG: HID / Ethernet / mass storage) ----
CONFIG_USB_DWC2=y
CONFIG_USB_DWC2_DUAL_ROLE=y
CONFIG_USB_GADGET=y
CONFIG_USB_LIBCOMPOSITE=y
CONFIG_USB_CONFIGFS=y
CONFIG_USB_CONFIGFS_F_HID=y
CONFIG_USB_CONFIGFS_ECM=y
CONFIG_USB_CONFIGFS_RNDIS=y
CONFIG_USB_CONFIGFS_MASS_STORAGE=y
CONFIG_USB_CONFIGFS_F_FS=y
CONFIG_USB_CONFIGFS_ACM=y
CONFIG_USB_CONFIGFS_SERIAL=y

# ---- WiFi: mac80211 stack + onboard brcmfmac + external adapters ----
CONFIG_CFG80211=y
CONFIG_CFG80211_WEXT=y
CONFIG_MAC80211=y
CONFIG_MAC80211_MESH=y
CONFIG_BRCMFMAC=m
CONFIG_BRCMFMAC_SDIO=y
CONFIG_RTL8XXXU=m
CONFIG_RT2800USB=m
CONFIG_ATH9K_HTC=m
CONFIG_CARL9170=m
CONFIG_RTL8187=m

# ---- Netfilter / sniffing / tunnel ----
CONFIG_NETFILTER=y
CONFIG_NF_CONNTRACK=y
CONFIG_IP_NF_IPTABLES=y
CONFIG_IP_NF_NAT=y
CONFIG_NETFILTER_XT_TARGET_NFLOG=y
CONFIG_NETFILTER_XT_MATCH_STRING=y
CONFIG_PACKET=y
CONFIG_TUN=y
CONFIG_WIREGUARD=y

# ---- Bluetooth / BLE ----
CONFIG_BT=y
CONFIG_BT_BREDR=y
CONFIG_BT_LE=y
CONFIG_BT_RFCOMM=y
CONFIG_BT_BNEP=y
CONFIG_BT_HIDP=y
CONFIG_BT_HCIBTUSB=m

# ---- Hardware buses: UART/SPI/I2C/CAN + USB-serial bridges ----
CONFIG_I2C_CHARDEV=y
CONFIG_SPI_SPIDEV=y
CONFIG_USB_SERIAL=y
CONFIG_USB_SERIAL_FTDI_SIO=m
CONFIG_USB_SERIAL_CP210X=m
CONFIG_USB_SERIAL_PL2303=m
CONFIG_USB_SERIAL_CH341=m
CONFIG_USB_ACM=m
CONFIG_CAN=m
CONFIG_CAN_RAW=m
CONFIG_CAN_MCP251X=m

# ---- Storage / forensics ----
CONFIG_USB_STORAGE=y
CONFIG_NTFS3_FS=m
CONFIG_EXFAT_FS=m

# ---- Containers / read-only root ----
CONFIG_OVERLAY_FS=y
CONFIG_NAMESPACES=y
CONFIG_NET_NS=y
CONFIG_SQUASHFS=y

# ---- USB Ethernet adapters (2nd NIC) ----
CONFIG_USB_NET_DRIVERS=y
CONFIG_USB_USBNET=m
CONFIG_USB_NET_AX88179_178A=m
CONFIG_USB_RTL8152=m
CONFIG_USB_NET_CDCETHER=m

# ---- USB LTE/4G modem (cellular uplink) ----
CONFIG_USB_SERIAL_OPTION=m
CONFIG_USB_NET_CDC_NCM=m
CONFIG_USB_NET_HUAWEI_CDC_NCM=m
CONFIG_USB_NET_QMI_WWAN=m

# ---- RTC (keep time without network) ----
CONFIG_RTC_DRV_DS1307=m
